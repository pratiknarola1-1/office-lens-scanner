name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Enable Corepack
        run: corepack enable
      
      - name: Install NativeScript CLI
        run: npm install -g nativescript
      
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Download native libraries (OpenCV + Tesseract)
        run: |
          # Download prebuilt native libraries from the original repo's dev_resources release
          gh release download dev_resources --repo Akylas/OSS-DocumentScanner --pattern "android.zip" --dir .
          unzip -q android.zip
          ls -la opencv/ tesseract/ 2>/dev/null || echo "Checking extracted structure..."
          find . -name "libtesseract.a" -o -name "libopencv*.a" 2>/dev/null | head -10
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Install dependencies
        run: yarn install
      
      - name: Create environment file
        run: |
          cat > .env.ci << 'EOF'
          export APP_ID=com.akylas.documentscanner
          export APP_BUILD_PATH=build/documentscanner
          export APP_RESOURCES=App_Resources/documentscanner
          EOF
      
      - name: Build Android APK (debug)
        run: |
          source .env.ci
          ns build android --debug --env.devlog 2>&1 | tee build.log || true
        continue-on-error: true
      
      - name: Check build output
        run: |
          echo "=== Build log tail ==="
          tail -100 build.log
          echo "=== Searching for APK ==="
          find platforms -name "*.apk" 2>/dev/null || echo "No APK in platforms/"
          find . -name "*.apk" -not -path "./node_modules/*" 2>/dev/null | head -5
      
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-apk
          path: |
            platforms/android/app/build/outputs/apk/**/*.apk
            **/*.apk
          if-no-files-found: warn
          retention-days: 7
