name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Enable Corepack
        run: |
          corepack enable
          yarn config get globalFolder
      
      - name: Install NativeScript (Akylas fork)
        run: |
          npm i -g @akylas/nativescript-cli --ignore-scripts --legacy-peer-deps
          ns package-manager set yarn2
          ns usage-reporting disable
          ns error-reporting disable
      
      - name: Download native libraries
        run: |
          gh release download dev_resources --repo Akylas/OSS-DocumentScanner --pattern "android.zip" --dir .
          unzip -q android.zip
          ls -la opencv/ tesseract/ 2>/dev/null || echo "Checking structure..."
          find . -maxdepth 3 -type d -name "opencv" -o -name "tesseract" 2>/dev/null
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Clean non-patch resolutions
        run: |
          node -e '
            const fs = require("fs");
            try {
              const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
              if (pkg.resolutions) {
                pkg.resolutions = Object.fromEntries(
                  Object.entries(pkg.resolutions).filter(([_, v]) => typeof v === "string" && v.startsWith("patch:"))
                );
                fs.writeFileSync("package.json", JSON.stringify(pkg, null, 2));
              }
            } catch(e) { console.log(e); }'
      
      - name: Install dependencies
        run: yarn install
      
      - name: Create environment file
        run: |
          cat > .env.ci << 'EOF'
          export APP_ID=com.akylas.documentscanner
          export APP_BUILD_PATH=build/documentscanner
          export APP_RESOURCES=App_Resources/documentscanner
          EOF
      
      - name: Build Android APK (debug)
        run: |
          source .env.ci
          ns build android --debug --env.devlog 2>&1 | tee build.log
        continue-on-error: true
      
      - name: Check build output
        run: |
          echo "=== Build log tail ==="
          tail -100 build.log
          echo "=== Searching for APK ==="
          find platforms -name "*.apk" 2>/dev/null || echo "No APK in platforms/"
          find . -name "*.apk" -not -path "./node_modules/*" 2>/dev/null | head -5
      
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-apk
          path: |
            platforms/android/app/build/outputs/apk/**/*.apk
            **/*.apk
          if-no-files-found: warn
          retention-days: 7
