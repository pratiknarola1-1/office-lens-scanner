name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Enable Corepack
        run: corepack enable
      
      - name: Install NativeScript CLI
        run: npm install -g nativescript
      
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Download OpenCV for Android
        run: |
          mkdir -p opencv/android
          wget -q https://github.com/nihui/opencv-mobile/releases/latest/download/opencv-mobile-4.8.1-android.zip -O opencv-mobile.zip
          unzip -q opencv-mobile.zip -d opencv-temp
          # Copy the necessary libs/includes - adjust structure as needed
          cp -r opencv-mobile-*/sdk/native/jni/* opencv/android/ 2>/dev/null || true
          cp -r opencv-mobile-*/sdk/native/libs/* opencv/android/ 2>/dev/null || true
          ls -la opencv/android/ || echo "OpenCV structure needs adjustment"
      
      - name: Download Tesseract for Android
        run: |
          mkdir -p tesseract/android
          # Download prebuilt tesseract from the project's dev_resources
          wget -q https://github.com/Akylas/OSS-DocumentScanner/releases/download/dev_resources/tesseract_android.tar.gz -O tesseract_android.tar.gz || echo "Tesseract download failed - will try alternative"
          if [ -f tesseract_android.tar.gz ]; then
            tar -xzf tesseract_android.tar.gz -C tesseract/android --strip-components=1
          fi
          ls -la tesseract/android/ || echo "Tesseract structure needs adjustment"
      
      - name: Download dev_resources
        run: |
          # Try to download the full dev_resources which includes opencv and tesseract
          wget -q https://github.com/Akylas/OSS-DocumentScanner/releases/download/dev_resources/dev_resources.tar.gz -O dev_resources.tar.gz || echo "dev_resources download failed"
          if [ -f dev_resources.tar.gz ]; then
            tar -xzf dev_resources.tar.gz
            ls -la opencv/ tesseract/ 2>/dev/null || true
          fi
      
      - name: Install dependencies
        run: yarn install
      
      - name: Create .env file
        run: |
          echo "source .env.ci" > .env
          cat .env.ci || echo "No .env.ci found, creating minimal env"
          cat > .env.ci << 'EOF'
          export APP_ID=com.akylas.documentscanner
          export APP_BUILD_PATH=build/documentscanner
          export APP_RESOURCES=App_Resources/documentscanner
          EOF
      
      - name: Build Android APK (debug)
        run: |
          source .env.ci
          ns build android --debug --env.devlog 2>&1 | tee build.log || true
        continue-on-error: true
      
      - name: List build output
        run: |
          find platforms/android -name "*.apk" 2>/dev/null || echo "No APK found in platforms/android"
          find . -name "*.apk" 2>/dev/null | head -5
          cat build.log | tail -100
      
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-apk
          path: |
            platforms/android/app/build/outputs/apk/**/*.apk
            **/*.apk
          if-no-files-found: warn
          retention-days: 7
